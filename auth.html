<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicaQuest - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-wrapper {
      display: flex;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      align-items: flex-start;
    }

    /* Chatbot Section - Left Side */
    .chatbot-section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 25px;
      width: 350px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .chatbot-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e0e0e0;
    }

    .chatbot-header h3 {
      font-size: 1.2rem;
      color: #333;
      font-weight: 600;
    }

    .chatbot-messages {
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 12px;
    }

    .chat-message {
      margin-bottom: 12px;
      padding: 12px 15px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .chat-message.bot {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-right: 20px;
    }

    .chat-message.user {
      background: white;
      color: #333;
      margin-left: 20px;
      border: 1px solid #e0e0e0;
    }

    .chat-input-group {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .chat-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .chat-send-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .chat-send-btn:hover {
      transform: translateY(-2px);
    }

    /* Auth Container - Right Side */
    .auth-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      flex: 1;
      max-width: 500px;
    }

    .auth-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 40px 30px;
      text-align: center;
    }

    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 1rem;
      opacity: 0.95;
    }

    .auth-body {
      padding: 40px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }

    .auth-tab {
      flex: 1;
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .auth-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.9rem;
    }

    .error-message {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mobile Responsive */
    @media (max-width: 968px) {
      .auth-wrapper {
        flex-direction: column;
        align-items: center;
      }
      
      .chatbot-section {
        width: 100%;
        max-width: 500px;
        order: 2;
      }
      
      .chatbot-messages {
        height: 250px;
      }
      
      .auth-container {
        width: 100%;
        order: 1;
      }
    }

    /* Scrollbar Styling */
    .chatbot-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chatbot-messages::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .chatbot-messages::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="auth-wrapper">
    <!-- Chatbot Section - Left Side -->
    <div class="chatbot-section">
      <div class="chatbot-header">
        <span style="font-size: 1.5rem;">🤖</span>
        <h3>AI Assistant</h3>
      </div>
      
      <div class="chatbot-messages" id="chatMessages">
        <div class="chat-message bot">
          👋 Hello! I'm your CivicaQuest AI helper. Ask me about:
          <br>• How to get started
          <br>• Voting & Democracy
          <br>• Constitution basics
          <br>• Using the platform
        </div>
      </div>
      
      <div class="chat-input-group">
        <input 
          type="text" 
          class="chat-input" 
          id="chatInput" 
          placeholder="Ask me anything..."
          autocomplete="off"
        >
        <button class="chat-send-btn" id="chatSend">Send</button>
      </div>
    </div>

    <!-- Auth Container - Right Side -->
    <div class="auth-container">
      <div class="auth-header">
        <h1>🏛️ CivicaQuest</h1>
        <p>Learn Democracy Through Interactive Games</p>
      </div>

      <div class="auth-body">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
          </div>
          <button type="submit" class="auth-btn">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required>
          </div>
          <div class="form-group">
            <label for="signupPasswordConfirm">Confirm Password</label>
            <input type="password" id="signupPasswordConfirm" placeholder="Re-enter password" required>
          </div>
          <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="back-link">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      updateProfile 
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { 
      doc, 
      setDoc, 
      serverTimestamp 
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Chatbot functionality
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');

    const chatbotResponses = {
      'hi': 'Hello! Ready to start your civic learning journey?',
      'hello': 'Hi there! How can I help you today?',
      'help': 'I can help you with: Login, Sign up, Voting, Constitution, Parliament, and using CivicaQuest features.',
      'vote': 'In CivicaQuest, you can learn about voting through our EVM simulator! It teaches you the complete voting process.',
      'voting': 'Our voting simulator shows you how Electronic Voting Machines (EVMs) work and the importance of VVPAT verification.',
      'constitution': 'Learn about fundamental rights, duties, and the structure of Indian democracy in our Constitution section.',
      'parliament': 'Experience how Parliament works through our interactive simulators - make laws, debate, and understand governance!',
      'start': 'Just create an account or login, then explore our games: Budget Game, Quiz, Voting Simulator, and Parliament Simulator!',
      'features': 'CivicaQuest offers: Interactive games, AI guidance, Progress tracking, Leaderboards, and real civic learning.',
      'game': 'Try our Budget Game to manage government funds, Quiz Game for testing knowledge, or Voting Simulator!',
      'default': 'Interesting question! Try asking about: voting, constitution, parliament, games, or how to get started.'
    };

    function addMessage(text, isBot = false) {
      const msg = document.createElement('div');
      msg.className = `chat-message ${isBot ? 'bot' : 'user'}`;
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getBotResponse(userText) {
      const text = userText.toLowerCase().trim();
      
      for (let key in chatbotResponses) {
        if (text.includes(key)) {
          return chatbotResponses[key];
        }
      }
      return chatbotResponses['default'];
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      addMessage(text, false);
      chatInput.value = '';
      
      setTimeout(() => {
        const response = getBotResponse(text);
        addMessage(response, true);
      }, 500);
    }

    chatSend.onclick = sendMessage;
    chatInput.onkeypress = (e) => {
      if (e.key === 'Enter') sendMessage();
    };

    // Tab switching
    window.switchTab = function(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
        document.getElementById('signupForm').classList.add('active');
      }
      
      hideMessages();
    };

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      setTimeout(() => successDiv.style.display = 'none', 3000);
    }

    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }

    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      showLoading(true);

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (error) {
        showLoading(false);
        console.error('Login error:', error);
        
        let errorMessage = 'Login failed. Please try again.';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          errorMessage = 'Invalid email or password.';
        } else if (error.code === 'auth/wrong-password') {
          errorMessage = 'Incorrect password.';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = 'Invalid email address.';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = 'Too many attempts. Try again later.';
        }
        
        showError(errorMessage);
      }
    });

    // Signup Form Handler
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

      if (!name || !email || !password || !passwordConfirm) {
        showError('Please fill in all fields');
        return;
      }

      if (name.length < 2) {
        showError('Name must be at least 2 characters');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      if (password !== passwordConfirm) {
        showError('Passwords do not match');
        return;
      }

      showLoading(true);

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await updateProfile(user, {
          displayName: name
        });

        await setDoc(doc(db, 'users', user.uid), {
          uid: user.uid,
          name: name,
          email: email,
          createdAt: serverTimestamp(),
          lastLogin: serverTimestamp(),
          scores: {
            budget: 0,
            quiz: 0,
            voting: 0,
            parliament: 0,
            total: 0
          },
          xp: 0,
          level: 1,
          badges: [],
          gamesPlayed: 0,
          missionsCompleted: 0
        });

        showSuccess('Account created! Redirecting...');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        showLoading(false);
        console.error('Signup error:', error);
        
        let errorMessage = 'Signup failed. Please try again.';
        if (error.code === 'auth/email-already-in-use') {
          errorMessage = 'Email already registered. Please login.';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = 'Invalid email address.';
        } else if (error.code === 'auth/weak-password') {
          errorMessage = 'Password too weak. Use 6+ characters.';
        }
        
        showError(errorMessage);
      }
    });

    // Check if already logged in
    auth.onAuthStateChanged((user) => {
      if (user && !window.location.search.includes('force')) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
