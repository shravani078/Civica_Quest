<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - CivicaQuest</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .stat-card h3 {
      color: #667eea;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
    }

    .leaderboard-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .tab-btn.active {
      background: white;
      color: #667eea;
    }

    .leaderboard-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .leaderboard-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .leaderboard-header h2 {
      font-size: 1.5rem;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table thead {
      background: #f5f5f5;
    }

    .leaderboard-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #667eea;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .leaderboard-table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }

    .leaderboard-table tr:hover {
      background: #f9f9f9;
    }

    .rank {
      font-weight: bold;
      font-size: 1.2rem;
    }

    .rank.gold { color: #FFD700; }
    .rank.silver { color: #C0C0C0; }
    .rank.bronze { color: #CD7F32; }

    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .player-name {
      font-weight: 600;
      color: #333;
    }

    .player-email {
      font-size: 0.85rem;
      color: #999;
    }

    .score {
      font-weight: bold;
      font-size: 1.1rem;
      color: #667eea;
    }

    .badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .badge {
      background: #f0f0f0;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #666;
    }

    .current-user {
      background: #e6f7ff !important;
      border-left: 4px solid #667eea;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 1.2rem;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .leaderboard-table {
        font-size: 0.9rem;
      }

      .leaderboard-table th,
      .leaderboard-table td {
        padding: 10px;
      }

      .badges {
        display: none;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← Back to Dashboard</a>

  <div class="container">
    <div class="header">
      <h1>🏆 Leaderboard</h1>
      <p>Compete with learners from around the world</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Players</h3>
        <div class="value" id="totalPlayers">-</div>
      </div>
      <div class="stat-card">
        <h3>Your Rank</h3>
        <div class="value" id="yourRank">-</div>
      </div>
      <div class="stat-card">
        <h3>Your Score</h3>
        <div class="value" id="yourScore">0</div>
      </div>
      <div class="stat-card">
        <h3>Your Level</h3>
        <div class="value" id="yourLevel">1</div>
      </div>
    </div>

    <div class="leaderboard-tabs">
      <button class="tab-btn active" onclick="switchTab('total')">Overall</button>
      <button class="tab-btn" onclick="switchTab('budget')">Budget Game</button>
      <button class="tab-btn" onclick="switchTab('quiz')">Constitution Quiz</button>
      <button class="tab-btn" onclick="switchTab('voting')">Voting Sim</button>
      <button class="tab-btn" onclick="switchTab('xp')">XP Ranking</button>
    </div>

    <div class="leaderboard-card">
      <div class="leaderboard-header">
        <h2 id="leaderboardTitle">Overall Rankings</h2>
      </div>
      
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p>Loading leaderboard data...</p>
      </div>

      <div id="noDataState" class="no-data" style="display: none;">
        <p>No leaderboard data available yet. Be the first to play!</p>
      </div>

      <table class="leaderboard-table" id="leaderboardTable" style="display: none;">
        <thead>
          <tr>
            <th style="width: 80px;">Rank</th>
            <th>Player</th>
            <th style="width: 120px;">Score</th>
            <th style="width: 100px;">Level</th>
            <th>Badges</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { 
      collection, 
      query, 
      orderBy, 
      limit, 
      getDocs,
      doc,
      getDoc
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    let currentUser = null;
    let currentTab = 'total';
    let allUsers = [];

    // Tab titles
    const tabTitles = {
      total: 'Overall Rankings',
      budget: 'Budget Allocation Champions',
      quiz: 'Constitution Quiz Masters',
      voting: 'Voting Simulation Leaders',
      xp: 'XP & Level Rankings'
    };

    // Switch tabs
    window.switchTab = function(tab) {
      currentTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Update title
      document.getElementById('leaderboardTitle').textContent = tabTitles[tab];
      
      // Re-render leaderboard
      renderLeaderboard();
    };

    // Get initials for avatar
    function getInitials(name) {
      return name
        .split(' ')
        .map(word => word[0])
        .join('')
        .toUpperCase()
        .slice(0, 2);
    }

    // Get rank medal
    function getRankMedal(rank) {
      if (rank === 1) return '🥇';
      if (rank === 2) return '🥈';
      if (rank === 3) return '🥉';
      return rank;
    }

    // Get rank class
    function getRankClass(rank) {
      if (rank === 1) return 'gold';
      if (rank === 2) return 'silver';
      if (rank === 3) return 'bronze';
      return '';
    }

    // Sort users based on current tab
    function sortUsers(users) {
      const sorted = [...users];
      
      switch(currentTab) {
        case 'budget':
          sorted.sort((a, b) => (b.scores?.budget || 0) - (a.scores?.budget || 0));
          break;
        case 'quiz':
          sorted.sort((a, b) => (b.scores?.quiz || 0) - (a.scores?.quiz || 0));
          break;
        case 'voting':
          sorted.sort((a, b) => (b.scores?.voting || 0) - (a.scores?.voting || 0));
          break;
        case 'xp':
          sorted.sort((a, b) => (b.xp || 0) - (a.xp || 0));
          break;
        default: // total
          sorted.sort((a, b) => (b.scores?.total || 0) - (a.scores?.total || 0));
      }
      
      return sorted;
    }

    // Get score for current tab
    function getScore(user) {
      switch(currentTab) {
        case 'budget':
          return user.scores?.budget || 0;
        case 'quiz':
          return user.scores?.quiz || 0;
        case 'voting':
          return user.scores?.voting || 0;
        case 'xp':
          return user.xp || 0;
        default:
          return user.scores?.total || 0;
      }
    }

    // Render leaderboard
    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboardBody');
      const table = document.getElementById('leaderboardTable');
      const loading = document.getElementById('loadingState');
      const noData = document.getElementById('noDataState');
      
      const sortedUsers = sortUsers(allUsers);
      
      if (sortedUsers.length === 0) {
        table.style.display = 'none';
        loading.style.display = 'none';
        noData.style.display = 'block';
        return;
      }
      
      tbody.innerHTML = '';
      
      sortedUsers.forEach((user, index) => {
        const rank = index + 1;
        const isCurrentUser = currentUser && user.uid === currentUser.uid;
        const score = getScore(user);
        
        const row = document.createElement('tr');
        if (isCurrentUser) {
          row.classList.add('current-user');
        }
        
        row.innerHTML = `
          <td class="rank ${getRankClass(rank)}">${getRankMedal(rank)}</td>
          <td>
            <div class="player-info">
              <div class="player-avatar">${getInitials(user.name || 'User')}</div>
              <div>
                <div class="player-name">${user.name || 'Anonymous'} ${isCurrentUser ? '(You)' : ''}</div>
                <div class="player-email">${user.email ? user.email.substring(0, 20) + (user.email.length > 20 ? '...' : '') : ''}</div>
              </div>
            </div>
          </td>
          <td class="score">${score.toLocaleString()}</td>
          <td><strong>Level ${user.level || 1}</strong></td>
          <td>
            <div class="badges">
              ${(user.badges || []).slice(0, 3).map(badge => `<span class="badge">${badge}</span>`).join('')}
              ${(user.badges || []).length > 3 ? `<span class="badge">+${(user.badges || []).length - 3}</span>` : ''}
            </div>
          </td>
        `;
        
        tbody.appendChild(row);
        
        // Update your rank if this is the current user
        if (isCurrentUser) {
          document.getElementById('yourRank').textContent = `#${rank}`;
        }
      });
      
      table.style.display = 'table';
      loading.style.display = 'none';
      noData.style.display = 'none';
    }

    // Load leaderboard data
    async function loadLeaderboard() {
      try {
        // Get all users
        const usersQuery = query(
          collection(db, 'users'),
          limit(100)
        );
        
        const querySnapshot = await getDocs(usersQuery);
        allUsers = [];
        
        querySnapshot.forEach((doc) => {
          allUsers.push(doc.data());
        });
        
        // Update stats
        document.getElementById('totalPlayers').textContent = allUsers.length;
        
        // Render leaderboard
        renderLeaderboard();
        
      } catch (error) {
        console.error('Error loading leaderboard:', error);
        document.getElementById('loadingState').innerHTML = `
          <p>Error loading leaderboard. Please refresh the page.</p>
          <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
        `;
      }
    }

    // Initialize
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        
        try {
          // Get current user's data
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          const userData = userDoc.data();
          
          if (userData) {
            document.getElementById('yourScore').textContent = (userData.scores?.total || 0).toLocaleString();
            document.getElementById('yourLevel').textContent = userData.level || 1;
          }
          
          // Load leaderboard
          await loadLeaderboard();
          
        } catch (error) {
          console.error('Error loading user data:', error);
          await loadLeaderboard();
        }
      } else {
        // Not logged in
        document.getElementById('yourRank').textContent = '-';
        document.getElementById('yourScore').textContent = '-';
        document.getElementById('yourLevel').textContent = '-';
        
        // Still load leaderboard
        await loadLeaderboard();
      }
    });
  </script>
</body>
</html>
